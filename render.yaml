# Configuração para Deploy no Render
# Sistema de Reservas do Restaurante

services:
  - type: web
    name: vamos-comemorar-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Obrigatório: vincule o Postgres ao web service OU cole a Internal Database URL aqui.
      # Dashboard: Web Service → Environment → DATABASE_URL
      - key: DATABASE_URL
        sync: false
      - key: FTP_HOST
        value: 195.35.41.247
      - key: FTP_USER
        value: u621081794
      - key: FTP_PASSWORD
        value: "Jeffl1ma!@"
      # ⚠️ TEMPORÁRIO: Validação de geolocalização desabilitada para testes
      # REMOVER ESTA LINHA APÓS OS TESTES!
      - key: SKIP_GEO_VALIDATION
        value: "true"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1